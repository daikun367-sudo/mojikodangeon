<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>門司港ダンジョンRPG</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Cinzel:wght@700&display=swap');
:root{--bg:#0d0d14;--panel:#13131f;--border:#2a2a42;--gold:#c8a84b;--gold-dim:#7a6330;--red:#e05050;--cyan:#4ecdc4;--green:#4ecda0;--text:#d4cfc8;--text-dim:#7a7870;--locked:#3a3a50}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--panel);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.title-block{display:flex;flex-direction:column}
.title-en{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--gold-dim)}
.title-ja{font-size:16px;font-weight:900;color:var(--gold)}
.gps-badge{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 10px}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s}
.gps-dot.active{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#map{flex:1;min-height:0;z-index:1}
.leaflet-control-attribution{font-size:9px !important}
.bottom-panel{background:var(--panel);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0;z-index:10}
.panel-label{font-size:10px;color:var(--gold-dim);letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px}
.dungeon-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.dungeon-scroll::-webkit-scrollbar{display:none}
.dungeon-card{flex-shrink:0;width:130px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;cursor:pointer;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.dungeon-card.nearby{border-color:var(--gold)}
.dungeon-card.nearby::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(200,168,75,.08) 0%,transparent 60%);pointer-events:none}
.dungeon-card.cleared{border-color:var(--green);opacity:.7}
.dungeon-card:active{transform:scale(.97)}
.card-icon{font-size:22px;margin-bottom:4px}
.card-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.card-status{font-size:10px;display:flex;align-items:center;gap:4px}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--locked)}
.dungeon-card.nearby .status-dot{background:var(--gold)}
.dungeon-card.cleared .status-dot{background:var(--green)}
.status-text{color:var(--text-dim)}
.dungeon-card.nearby .status-text{color:var(--gold)}
.dungeon-card.cleared .status-text{color:var(--green)}
.card-dist{font-size:10px;color:var(--text-dim);margin-top:4px}
.enter-btn{display:none;margin-top:8px;width:100%;background:var(--gold);color:#0d0d14;border:none;border-radius:4px;padding:5px 0;font-size:11px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.dungeon-card.nearby .enter-btn{display:block}
.demo-bar{background:rgba(78,205,196,.1);border-top:1px solid rgba(78,205,196,.3);padding:6px 16px;font-size:11px;color:var(--cyan);display:flex;align-items:center;gap:6px;flex-shrink:0}
/* 全画面 */
.screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;flex-direction:column;overflow:hidden}
.screen.open{display:flex}
.dungeon-header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.back-btn{background:none;border:1px solid var(--border);color:var(--text-dim);border-radius:6px;padding:6px 10px;font-size:12px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.dungeon-header-title{font-size:15px;font-weight:900;color:var(--gold)}
.dungeon-header-sub{font-size:11px;color:var(--text-dim)}
.explore-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
/* 進捗 */
.progress-row{display:flex;align-items:center;gap:8px}
.progress-label{font-size:11px;color:var(--text-dim);white-space:nowrap}
.progress-bar{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:3px;transition:width .4s}
/* 問題カード */
.quiz-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:10px}
.quiz-card.solved{border-color:var(--green)}
.quiz-card-header{display:flex;align-items:center;gap:10px}
.quiz-num{font-size:11px;color:var(--gold-dim);font-weight:700;letter-spacing:.1em}
.quiz-card-title{font-size:13px;font-weight:700;color:var(--text)}
.quiz-solved-badge{font-size:11px;color:var(--green);margin-left:auto}
/* 入力エリア */
.answer-row{display:flex;gap:8px}
.answer-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-size:14px;color:var(--text);font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s}
.answer-input:focus{border-color:var(--gold)}
.answer-input.correct{border-color:var(--green);background:rgba(78,205,160,.07)}
.answer-input.wrong{border-color:var(--red);background:rgba(224,80,80,.07)}
.submit-btn{background:var(--gold);color:#0d0d14;border:none;border-radius:6px;padding:10px 14px;font-size:13px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;white-space:nowrap}
.submit-btn:disabled{opacity:.4;cursor:default}
.answer-feedback{font-size:12px;padding:6px 10px;border-radius:6px;text-align:center}
.answer-feedback.ok{background:rgba(78,205,160,.15);color:var(--green)}
.answer-feedback.ng{background:rgba(224,80,80,.15);color:var(--red)}
/* ボス解放 */
.boss-banner{background:linear-gradient(135deg,#2a1a1a,#1a0d0d);border:1px solid var(--red);border-radius:10px;padding:16px;text-align:center;cursor:pointer;animation:glowRed 2s ease-in-out infinite}
@keyframes glowRed{0%,100%{box-shadow:0 0 8px rgba(224,80,80,.3)}50%{box-shadow:0 0 20px rgba(224,80,80,.6)}}
.boss-banner-title{font-size:18px;font-weight:900;color:var(--red);margin-bottom:4px}
.boss-banner-sub{font-size:12px;color:var(--text-dim)}
/* ボス戦 */
.boss-screen{background:radial-gradient(ellipse at top,#1a0a0a,var(--bg))}
.boss-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px}
.boss-emoji{font-size:72px;animation:bossFloat 3s ease-in-out infinite}
@keyframes bossFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.boss-name{font-size:22px;font-weight:900;color:var(--red)}
.boss-hp-wrap,.player-hp-wrap{width:100%;max-width:300px}
.boss-hp-label,.player-hp-label{font-size:11px;color:var(--text-dim);margin-bottom:4px;display:flex;justify-content:space-between}
.boss-hp-bar{height:14px;background:var(--border);border-radius:7px;overflow:hidden}
.boss-hp-fill{height:100%;background:linear-gradient(90deg,#e05050,#ff8080);border-radius:7px;transition:width .5s}
.player-hp-bar{height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.player-hp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),#80ffe8);border-radius:5px;transition:width .5s}
.battle-log{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px;width:100%;max-width:300px;font-size:13px;color:var(--text);line-height:1.6;min-height:60px;white-space:pre-line}
.boss-actions{display:flex;gap:10px;width:100%;max-width:300px}
.attack-btn{flex:1;background:var(--red);color:white;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.attack-btn:disabled{opacity:.4;cursor:default}
.skill-btn{flex:1;background:var(--gold);color:#0d0d14;border:none;border-radius:8px;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.skill-btn:disabled{opacity:.4;cursor:default}
/* クリア */
.clear-screen{background:radial-gradient(ellipse at center,#1a1a0a,var(--bg));align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:30px}
.clear-title{font-size:32px;font-weight:900;color:var(--gold)}
.clear-sub{font-size:14px;color:var(--text-dim);line-height:1.7;white-space:pre-line}
.clear-back{background:var(--gold);color:#0d0d14;border:none;border-radius:8px;padding:14px 32px;font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;margin-top:8px}
/* 地図モーダル */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-bottom:none;border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:24px 20px 32px;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.modal-icon{font-size:36px}
.modal-title{font-size:18px;font-weight:900;color:var(--gold);line-height:1.2}
.modal-subtitle{font-size:11px;color:var(--text-dim);margin-top:2px}
.modal-desc{font-size:13px;color:var(--text);line-height:1.7;margin-bottom:16px;border-left:2px solid var(--gold-dim);padding-left:10px}
.modal-enemies{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:16px}
.enemies-label{font-size:10px;color:var(--text-dim);letter-spacing:.1em;margin-bottom:6px}
.enemy-list{display:flex;gap:8px;flex-wrap:wrap}
.enemy-tag{font-size:11px;background:var(--border);border-radius:4px;padding:3px 8px;color:var(--text)}
.modal-actions{display:flex;gap:8px}
.btn-enter{flex:1;background:var(--gold);color:#0d0d14;border:none;border-radius:6px;padding:12px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
.btn-enter:disabled{opacity:.5;cursor:default}
.btn-close{background:var(--bg);color:var(--text-dim);border:1px solid var(--border);border-radius:6px;padding:12px 16px;font-size:14px;font-family:'Noto Sans JP',sans-serif;cursor:pointer}
/* マーカー */
.custom-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer}
.marker-bubble{background:var(--panel);border:2px solid var(--border);border-radius:8px;padding:4px 8px;font-size:18px;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.5)}
.marker-bubble.nearby-marker{border-color:var(--gold);box-shadow:0 0 10px rgba(200,168,75,.4)}
.marker-bubble.cleared-marker{border-color:var(--green)}
.marker-label{font-size:9px;font-weight:700;color:var(--text);background:rgba(13,13,20,.85);border-radius:3px;padding:1px 4px;margin-top:2px;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.player-marker-inner{width:14px;height:14px;background:var(--cyan);border:2px solid white;border-radius:50%;box-shadow:0 0 10px var(--cyan);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--cyan)}50%{box-shadow:0 0 16px var(--cyan)}}
</style>
</head>
<body>
<header>
  <div class="title-block">
    <span class="title-en">MOJIKO DUNGEON RPG</span>
    <span class="title-ja">門司港ダンジョン</span>
  </div>
  <div class="gps-badge">
    <div class="gps-dot" id="gpsDot"></div>
    <span id="gpsLabel">GPS待機中</span>
  </div>
</header>
<main>
  <div id="map"></div>
  <div class="demo-bar" id="demoBar" style="display:none">📍 デモモード：地図をタップして位置をシミュレート</div>
  <div class="bottom-panel">
    <div class="panel-label">▸ ダンジョン一覧</div>
    <div class="dungeon-scroll" id="dungeonScroll"></div>
  </div>
</main>

<!-- 地図モーダル -->
<div class="modal-overlay" id="modalOverlay" onclick="closeMapModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div><div class="modal-title" id="modalTitle"></div><div class="modal-subtitle" id="modalSubtitle"></div></div>
    </div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="modal-enemies"><div class="enemies-label">出現する敵</div><div class="enemy-list" id="enemyList"></div></div>
    <div class="modal-actions">
      <button class="btn-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">閉じる</button>
      <button class="btn-enter" id="enterBtn">▶ 突入する</button>
    </div>
  </div>
</div>

<!-- 探索・回答画面 -->
<div class="screen" id="exploreScreen">
  <div class="dungeon-header">
    <button class="back-btn" onclick="leaveExplore()">← 戻る</button>
    <div><div class="dungeon-header-title" id="expTitle"></div><div class="dungeon-header-sub" id="expSub"></div></div>
  </div>
  <div class="explore-body" id="exploreBody"></div>
</div>

<!-- ボス戦 -->
<div class="screen boss-screen" id="bossScreen">
  <div class="dungeon-header">
    <div style="width:60px"></div>
    <div style="flex:1;text-align:center"><div class="dungeon-header-title" id="bossAreaName"></div></div>
    <div style="width:60px"></div>
  </div>
  <div class="boss-area">
    <div class="boss-emoji" id="bossEmoji"></div>
    <div class="boss-name" id="bossName"></div>
    <div class="boss-hp-wrap">
      <div class="boss-hp-label"><span>BOSS HP</span><span id="bossHpNum"></span></div>
      <div class="boss-hp-bar"><div class="boss-hp-fill" id="bossHpFill"></div></div>
    </div>
    <div class="player-hp-wrap">
      <div class="player-hp-label"><span>自分 HP</span><span id="playerHpNum"></span></div>
      <div class="player-hp-bar"><div class="player-hp-fill" id="playerHpFill"></div></div>
    </div>
    <div class="battle-log" id="battleLog"></div>
    <div class="boss-actions">
      <button class="attack-btn" id="attackBtn" onclick="doAttack()">⚔️ 攻撃</button>
      <button class="skill-btn" id="skillBtn" onclick="doSkill()">✨ 必殺技</button>
    </div>
  </div>
</div>

<!-- クリア -->
<div class="screen clear-screen" id="clearScreen">
  <div style="font-size:64px">🏆</div>
  <div class="clear-title" id="clearTitle"></div>
  <div class="clear-sub" id="clearSub"></div>
  <button class="clear-back" onclick="backToMap()">地図へ戻る</button>
</div>

<script>
// ══ データ ══════════════════════════════════════════

    enemies:['昭和の呼び込み霊','アーケードの影','看板の怨念'],
    boss:{emoji:'🏮', name:'昭和の大店主霊', hp:100, atk:16},
    quizzes:[
      {id:'sk1', label:'問題①', answers:['雨でもぬれない','ぬれない','雨','あめ','屋根がある']},
      {id:'sk2', label:'問題②', answers:['銀天街','ぎんてんがい','GINTENGAI']},
      {id:'sk3', label:'問題③', answers:['自由回答']}, // 自由回答は常に正解扱い
    ]
  },
  {
    id:'museum', name:'関門海峡ミュージアム', icon:'🎡', lat:33.9438, lng:130.9569, level:4,
    theme:'海峡の記憶殿',
    desc:'2003年開館。関門海峡をテーマにした屋内型観光施設。海峡の歴史と謎が封印されている。',
    enemies:['海峡の幻影','潮流の精霊','海底の守護者'],
    boss:{emoji:'🌊', name:'関門海峡の大海神', hp:100, atk:18},
    quizzes:[
      {id:'mu1', label:'問題①', answers:['2003','2003年']},
      {id:'mu2', label:'問題②', answers:['関門海峡','かんもんかいきょう']},
      {id:'mu3', label:'問題③', answers:['福岡県と山口県','山口県と福岡県','ふくおかとやまぐち','福岡と山口']},
    ]
  },
  {
    id:'hotel', name:'門司港ホテル', icon:'🏨', lat:33.9469, lng:130.9626, level:4,
    theme:'イタリア建築の亡霊宮殿',
    desc:'1998年建造。イタリアの巨匠アルド・ロッシの遺作。白亜の建物に宮殿の亡霊が眠る。',
    enemies:['建築家の亡霊','白亜の守衛','宮殿の幻影'],
    boss:{emoji:'🏰', name:'建築の大亡霊ロッシ', hp:100, atk:18},
    quizzes:[
      {id:'h1', label:'問題①', answers:['1998','1998年']},
      {id:'h2', label:'問題②', answers:['アルド・ロッシ','アルドロッシ','aldo rossi']},
      {id:'h3', label:'問題③', answers:['白','しろ','白色','クリーム色','クリーム']},
    ]
  },
  {
    id:'retro', name:'レトロ展望室', icon:'🗼', lat:33.9484, lng:130.9641, level:5,
    theme:'高みの魔法陣',
    desc:'1999年建造、黒川紀章設計。地上103mから見下ろす門司港は古地図の魔法陣と重なっている。',
    enemies:['風の魔術師','鳥形の見張り番','展望の幻影'],
    boss:{emoji:'🌀', name:'天空の魔法陣守護者', hp:120, atk:20},
    quizzes:[
      {id:'t1', label:'問題①', answers:['1999','1999年']},
      {id:'t2', label:'問題②', answers:['103','103m','103メートル']},
      {id:'t3', label:'問題③', answers:['山口県','やまぐちけん','山口']},
    ]
  },
];

const ENTER_DIST = 80;
let playerLat=null, playerLng=null, playerMarker=null;
let cleared={};
let currentDungeon=null;
let solvedQuizzes={}; // {quizId: true}
let bossHp=0, bossMaxHp=0, playerHp=100, playerMaxHp=100;
let battleLock=false;

// ══ 地図 ══════════════════════════════════════════
const map = L.map('map',{center:[33.9462,130.9620],zoom:16,zoomControl:false})
  .addLayer(L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'&copy; OpenStreetMap contributors', maxZoom:19}));
L.control.zoom({position:'topright'}).addTo(map);

function makeDungeonIcon(d){
  const nearby=isNearby(d);
  const cls=cleared[d.id]?'cleared-marker':nearby?'nearby-marker':'';
  return L.divIcon({className:'',
    html:`<div class="custom-marker"><div class="marker-bubble ${cls}">${d.icon}</div><div class="marker-label">${d.name}</div></div>`,
    iconSize:[80,50],iconAnchor:[40,50]});
}
function makePlayerIcon(){
  return L.divIcon({className:'',html:`<div class="player-marker-inner"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
}

const dungeonMarkers={};
DUNGEONS.forEach(d=>{
  const m=L.marker([d.lat,d.lng],{icon:makeDungeonIcon(d)}).addTo(map);
  m.on('click',()=>openMapModal(d));
  dungeonMarkers[d.id]=m;
});

// ══ 距離・近接 ════════════════════════════════════
function calcDist(la1,ln1,la2,ln2){
  const R=6371000,dL=(la2-la1)*Math.PI/180,dN=(ln2-ln1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function isNearby(d){return playerLat!==null&&calcDist(playerLat,playerLng,d.lat,d.lng)<=ENTER_DIST;}
function getDist(d){return playerLat===null?null:Math.round(calcDist(playerLat,playerLng,d.lat,d.lng));}

// ══ カード描画 ════════════════════════════════════
function buildCards(){
  const s=document.getElementById('dungeonScroll');s.innerHTML='';
  DUNGEONS.forEach(d=>{
    const dist=getDist(d),nearby=isNearby(d),isCleared=cleared[d.id];
    let cls='dungeon-card'+(isCleared?' cleared':nearby?' nearby':'');
    const card=document.createElement('div');card.className=cls;
    card.innerHTML=`<div class="card-icon">${d.icon}</div>
      <div class="card-name">${d.name}</div>
      <div class="card-status"><div class="status-dot"></div>
        <span class="status-text">${isCleared?'クリア済':nearby?'解放中':'ロック'}</span></div>
      ${dist!==null?`<div class="card-dist">${dist<1000?dist+'m':(dist/1000).toFixed(1)+'km'}</div>`:''}
      ${nearby&&!isCleared?'<button class="enter-btn">▶ 入る</button>':''}`;
    card.addEventListener('click',()=>openMapModal(d));
    s.appendChild(card);
  });
}
function updateMarkers(){DUNGEONS.forEach(d=>dungeonMarkers[d.id].setIcon(makeDungeonIcon(d)));}

// ══ GPS ══════════════════════════════════════════
function setPlayerPos(lat,lng){
  playerLat=lat;playerLng=lng;
  if(!playerMarker)playerMarker=L.marker([lat,lng],{icon:makePlayerIcon(),zIndexOffset:1000}).addTo(map);
  else playerMarker.setLatLng([lat,lng]);
  updateMarkers();buildCards();
}
function startGPS(){
  if(!navigator.geolocation){setDemoMode();return;}
  navigator.geolocation.watchPosition(
    pos=>{document.getElementById('gpsDot').className='gps-dot active';
      document.getElementById('gpsLabel').textContent='GPS受信中';
      setPlayerPos(pos.coords.latitude,pos.coords.longitude);},
    ()=>setDemoMode(),{enableHighAccuracy:true,timeout:8000,maximumAge:3000});
}
function setDemoMode(){
  document.getElementById('gpsLabel').textContent='デモモード';
  document.getElementById('demoBar').style.display='flex';
  setPlayerPos(33.9451,130.9616);
  map.on('click',e=>{setPlayerPos(e.latlng.lat,e.latlng.lng);map.panTo(e.latlng);});
}

// ══ 地図モーダル ══════════════════════════════════
function openMapModal(d){
  currentDungeon=d;
  const dist=getDist(d),nearby=isNearby(d),isCleared=cleared[d.id];
  document.getElementById('modalIcon').textContent=d.icon;
  document.getElementById('modalTitle').textContent=d.name;
  document.getElementById('modalSubtitle').textContent=`Lv.${d.level}　${d.theme}`;
  document.getElementById('modalDesc').textContent=d.desc;
  document.getElementById('enemyList').innerHTML=d.enemies.map(e=>`<span class="enemy-tag">${e}</span>`).join('');
  const btn=document.getElementById('enterBtn');
  if(isCleared){btn.textContent='✅ クリア済';btn.disabled=true;}
  else if(nearby){btn.textContent='▶ ダンジョンへ突入';btn.disabled=false;
    btn.onclick=()=>{document.getElementById('modalOverlay').classList.remove('open');enterDungeon(d);};}
  else{btn.textContent=dist!==null?`🔒 あと約${dist}m`:'🔒 GPS未取得';btn.disabled=true;}
  document.getElementById('modalOverlay').classList.add('open');
  map.panTo([d.lat,d.lng]);
}
function closeMapModal(e){
  if(e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').classList.remove('open');
}

// ══ ダンジョン突入 ════════════════════════════════
function enterDungeon(d){
  currentDungeon=d;
  // 初回のみsolved初期化
  d.quizzes.forEach(q=>{if(solvedQuizzes[q.id]===undefined)solvedQuizzes[q.id]=false;});
  document.getElementById('expTitle').textContent=d.name+'　謎解き';
  document.getElementById('expSub').textContent=d.theme;
  renderExplore();
  document.getElementById('exploreScreen').classList.add('open');
}

// ══ 探索画面描画 ══════════════════════════════════
function renderExplore(){
  const d=currentDungeon;
  const solvedCount=d.quizzes.filter(q=>solvedQuizzes[q.id]).length;
  const total=d.quizzes.length;
  const allSolved=solvedCount===total;

  let html=`<div class="progress-row">
    <span class="progress-label">正解 ${solvedCount}/${total}</span>
    <div class="progress-bar"><div class="progress-fill" style="width:${(solvedCount/total)*100}%"></div></div>
  </div>`;

  d.quizzes.forEach((q,i)=>{
    const solved=solvedQuizzes[q.id];
    const isFree=q.answers.includes('自由回答');
    html+=`<div class="quiz-card${solved?' solved':''}">
      <div class="quiz-card-header">
        <span class="quiz-num">${q.label}</span>
        <span class="quiz-card-title">${isFree?'施設の中を観察しよう':'紙の問題に答えよう'}</span>
        ${solved?'<span class="quiz-solved-badge">✅ 正解</span>':''}
      </div>
      ${!solved?`
        <div class="answer-row">
          <input class="answer-input" id="input-${q.id}" type="text" placeholder="${isFree?'気づいたことを入力':'こたえを入力'}" autocomplete="off">
          <button class="submit-btn" onclick="submitAnswer('${q.id}')">決定</button>
        </div>
        <div class="answer-feedback" id="fb-${q.id}" style="display:none"></div>
      `:''}
    </div>`;
  });

  if(allSolved){
    html+=`<div class="boss-banner" onclick="startBoss()">
      <div class="boss-banner-title">👹 ボス出現！</div>
      <div class="boss-banner-sub">${d.boss.name}に挑む</div>
    </div>`;
  }

  document.getElementById('exploreBody').innerHTML=html;

  // Enterキーで決定
  d.quizzes.forEach(q=>{
    const inp=document.getElementById('input-'+q.id);
    if(inp) inp.addEventListener('keydown',e=>{if(e.key==='Enter')submitAnswer(q.id);});
  });
}

// ══ 回答判定 ══════════════════════════════════════
function normalize(str){
  return str.trim()
    .toLowerCase()
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xFEE0))
    .replace(/\s+/g,'');
}

function submitAnswer(qid){
  const q=currentDungeon.quizzes.find(x=>x.id===qid);
  const inp=document.getElementById('input-'+qid);
  const fb=document.getElementById('fb-'+qid);
  if(!q||!inp)return;

  const userAns=normalize(inp.value);
  if(!userAns){inp.focus();return;}

  // 自由回答は常に正解
  const isFree=q.answers.includes('自由回答');
  const correct=isFree||q.answers.some(a=>normalize(a)===userAns);

  fb.style.display='block';
  if(correct){
    inp.classList.add('correct');inp.disabled=true;
    inp.closest('.answer-row').querySelector('.submit-btn').disabled=true;
    fb.className='answer-feedback ok';
    fb.textContent=isFree?'✅ 記録した！':'🎉 正解！';
    solvedQuizzes[qid]=true;
    setTimeout(()=>renderExplore(),700);
  } else {
    inp.classList.add('wrong');
    fb.className='answer-feedback ng';
    fb.textContent='❌ ちがうよ、もう一度！';
    setTimeout(()=>{inp.classList.remove('wrong');fb.style.display='none';inp.value='';inp.focus();},1200);
  }
}

function leaveExplore(){document.getElementById('exploreScreen').classList.remove('open');}

// ══ ボス戦 ════════════════════════════════════════
function startBoss(){
  const d=currentDungeon;
  bossMaxHp=d.boss.hp;bossHp=d.boss.hp;
  playerMaxHp=100;playerHp=100;battleLock=false;
  document.getElementById('bossAreaName').textContent=d.name;
  document.getElementById('bossEmoji').textContent=d.boss.emoji;
  document.getElementById('bossName').textContent=d.boss.name;
  document.getElementById('battleLog').textContent=`${d.boss.name}が現れた！`;
  updateBossUI();
  document.getElementById('attackBtn').disabled=false;
  document.getElementById('skillBtn').disabled=false;
  document.getElementById('exploreScreen').classList.remove('open');
  document.getElementById('bossScreen').classList.add('open');
}
function updateBossUI(){
  document.getElementById('bossHpNum').textContent=`${bossHp}/${bossMaxHp}`;
  document.getElementById('bossHpFill').style.width=`${(bossHp/bossMaxHp)*100}%`;
  document.getElementById('playerHpNum').textContent=`${playerHp}/${playerMaxHp}`;
  document.getElementById('playerHpFill').style.width=`${(playerHp/playerMaxHp)*100}%`;
}
function lockBtns(ms){
  battleLock=true;document.getElementById('attackBtn').disabled=true;
  setTimeout(()=>{if(bossHp>0&&playerHp>0){battleLock=false;document.getElementById('attackBtn').disabled=false;}},ms);
}
function doAttack(){
  if(battleLock)return;
  const myDmg=15+Math.floor(Math.random()*10);
  bossHp=Math.max(0,bossHp-myDmg);updateBossUI();
  if(bossHp<=0){battleEnd(true);return;}
  const bossDmg=currentDungeon.boss.atk+Math.floor(Math.random()*8)-4;
  playerHp=Math.max(0,playerHp-bossDmg);updateBossUI();
  document.getElementById('battleLog').textContent=`⚔️ ${myDmg}のダメージ！\n👹 ボスの反撃 ${bossDmg}のダメージ！`;
  if(playerHp<=0){battleEnd(false);return;}
  lockBtns(800);
}
function doSkill(){
  if(battleLock)return;
  const myDmg=35+Math.floor(Math.random()*15);
  bossHp=Math.max(0,bossHp-myDmg);updateBossUI();
  document.getElementById('skillBtn').disabled=true;
  if(bossHp<=0){battleEnd(true);return;}
  const bossDmg=currentDungeon.boss.atk+Math.floor(Math.random()*8)-4;
  playerHp=Math.max(0,playerHp-bossDmg);updateBossUI();
  document.getElementById('battleLog').textContent=`✨ 必殺技！ ${myDmg}の大ダメージ！\n👹 ボスの反撃 ${bossDmg}のダメージ！`;
  if(playerHp<=0){battleEnd(false);return;}
  lockBtns(800);
}
function battleEnd(win){
  document.getElementById('attackBtn').disabled=true;document.getElementById('skillBtn').disabled=true;
  const d=currentDungeon;
  setTimeout(()=>{
    document.getElementById('bossScreen').classList.remove('open');
    if(win){
      cleared[d.id]=true;updateMarkers();buildCards();
      document.getElementById('clearTitle').textContent=d.name+'　クリア！';
      document.getElementById('clearSub').textContent=`${d.boss.name}を倒した！\n${d.name}の謎はすべて解き明かされた。`;
      document.getElementById('clearScreen').classList.add('open');
    } else {
      alert('💀 全滅…\nもう一度挑戦しよう！');
    }
  },600);
}
function backToMap(){document.getElementById('clearScreen').classList.remove('open');}

// ══ 起動 ══════════════════════════════════════════
buildCards();
startGPS();
</script>
